name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Lint
        run: |
          pip install ruff
          ruff check backend/app backend/tests worker
      - name: Install backend deps
        run: pip install -r backend/requirements.txt httpx websockets
      - name: Smoke test (boots server, exercises HTTP + WebSocket + worker API)
        run: python backend/tests/smoke.py

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build images
        run: docker compose build
